version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install -r backend/requirements.txt

  build:
    commands:
      - cd backend
      - python -m pytest tests/ -v --tb=short --junitxml=../test-results.xml

reports:
  pytest-results:
    files:
      - test-results.xml
    file-format: JUNITXML

artifacts:
  files:
    - "**/*"
