version: "3.9"

# Image tags and ECR URIs are injected at deploy time via .env.compose
# written by codedeploy/scripts/start_containers.sh

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vespa:
    image: vespaengine/vespa:8
    restart: unless-stopped
    volumes:
      - vespa_data:/opt/vespa/var
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19071/state/v1/health | grep -q 'up'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  claude-sandbox:
    image: ${ECR_CLAUDE_SANDBOX}:${IMAGE_TAG}
    restart: unless-stopped
    env_file: /app/.env.prod
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  backend:
    image: ${ECR_BACKEND}:${IMAGE_TAG}
    restart: unless-stopped
    env_file: /app/.env.prod
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      vespa:
        condition: service_healthy
      claude-sandbox:
        condition: service_healthy

  celery-worker:
    image: ${ECR_BACKEND}:${IMAGE_TAG}
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q celery
    restart: unless-stopped
    env_file: /app/.env.prod
    depends_on:
      redis:
        condition: service_healthy
      vespa:
        condition: service_healthy

  celery-agentic-worker:
    image: ${ECR_BACKEND}:${IMAGE_TAG}
    # Concurrency must stay equal to settings.AGENTIC_BATCH_MAX_CONCURRENCY
    # (backend/app/config.py) — these two numbers are coupled and drifting
    # them apart weakens the concurrency cap on in-flight sandbox calls.
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q agentic
    restart: unless-stopped
    env_file: /app/.env.prod
    depends_on:
      redis:
        condition: service_healthy
      claude-sandbox:
        condition: service_healthy

  frontend:
    image: ${ECR_FRONTEND}:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  # Bind-mounted to a dedicated 50GB EBS volume at /data/vespa (mounted via
  # /etc/fstab, UUID=83459e03-11db-4318-bf93-a60977287958), not the ephemeral
  # root volume — so the semantic index survives instance replacement instead
  # of requiring a ~10 hour re-embed (see docs/semantic-retrieval-deployment.md).
  vespa_data:
    driver: local
    driver_opts:
      type: none
      device: /data/vespa
      o: bind
