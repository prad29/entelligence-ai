version: "3.9"
services:
  vespa:
    image: vespaengine/vespa:8
    ports:
      - "8080:8080"   # query/feed API
      - "19071:19071" # config server
    volumes:
      - vespa_data:/opt/vespa/var
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19071/state/v1/health | grep -q '\"status\":\"up\"'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: amenity
      POSTGRES_PASSWORD: amenity
      POSTGRES_DB: amenitydb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amenity"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://amenity:amenity@db:5432/amenitydb
      VESPA_URL: http://vespa:8080
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vespa:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  vespa_data:
