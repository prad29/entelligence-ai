version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: amenity
      POSTGRES_PASSWORD: amenity
      POSTGRES_DB: amenitydb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amenity"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://amenity:amenity@db:5432/amenitydb
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      - backend
